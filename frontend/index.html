<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0F1C" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <!-- Preconnect to external domains -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="preconnect" href="//fonts.gstatic.com" crossorigin />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Enterprise Field Force & Van Sales Management Platform - Real-time tracking, route optimization, inventory management, KYC, surveys, analytics & commission tracking" />
    <meta name="keywords" content="van sales, field force, sales management, field marketing, route optimization, inventory tracking, KYC management, commission tracking, field operations, trade marketing, CRM, enterprise software" />
    <meta name="author" content="FieldVibe Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="FieldVibe - Field Operations & Sales Intelligence" />
    <meta property="og:description" content="Complete field operations management with real-time tracking, analytics, KYC, surveys & commission tracking" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fieldvibe.vantax.co.za" />
    <meta property="og:site_name" content="FieldVibe" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FieldVibe - Field Operations & Sales Intelligence" />
    <meta name="twitter:description" content="Complete field operations management with real-time tracking, analytics & commission tracking" />
    
    <title>FieldVibe - Field Operations & Sales Intelligence</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Recover from a stale SW-cached index.html: after a deploy, Pages purges
      // old hashed chunks, so a cached shell's script 404s and nothing mounts.
      // If #root is still empty well after load: first purge the navigation
      // cache and reload once (sessionStorage guard); if that already happened,
      // show a recovery screen with the boot error and a full reset button.
      ;(function () {
        var bootError = ''
        window.addEventListener('error', function (e) {
          if (!bootError) bootError = (e.message || '') + (e.filename ? ' @ ' + e.filename.split('/').pop() : '')
        })
        function fullReset() {
          var reload = function () { window.location.reload() }
          var jobs = []
          if (window.caches) jobs.push(caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k) })) }))
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister() })) }))
          }
          sessionStorage.removeItem('fv-shell-recovered')
          Promise.all(jobs).then(reload, reload)
        }
        function showRecovery() {
          var root = document.getElementById('root')
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:system-ui,sans-serif;padding:24px;text-align:center">' +
            '<h1 style="font-size:18px;margin:0">FieldVibe failed to load</h1>' +
            (bootError ? '<p style="font-size:12px;color:#64748b;word-break:break-all;max-width:480px;margin:0">' + bootError.replace(/</g, '&lt;') + '</p>' : '') +
            '<button id="fv-reset" style="padding:12px 24px;font-size:16px;border:0;border-radius:8px;background:#00E87B;color:#0A0F1C;font-weight:600">Reset app</button>' +
            '</div>'
          document.getElementById('fv-reset').addEventListener('click', fullReset)
        }
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root')
            if (!root || root.childElementCount !== 0) return
            if (!sessionStorage.getItem('fv-shell-recovered')) {
              sessionStorage.setItem('fv-shell-recovered', '1')
              var reload = function () { window.location.reload() }
              if (window.caches) caches.delete('navigation-cache').then(reload, reload)
              else reload()
            } else {
              showRecovery()
            }
          }, 4000)
        })
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
