name = "fieldvibe-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "fieldvibe-api.vantax.co.za/*", zone_name = "vantax.co.za" },
  { pattern = "fieldvibe.vantax.co.za/api/*", zone_name = "vantax.co.za" }
]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "fieldvibe-db"
database_id = "1521287d-96be-42b7-b77c-e8c5f67629a6"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "fieldvibe-uploads"

[placement]
mode = "smart"
